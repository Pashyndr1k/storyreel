name: Build installers

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # Pre-create the GitHub Release before the build matrix runs. Without this,
  # the three platform jobs race to create the same release and the losers'
  # asset uploads are silently lost (v1.14.1 and v1.15.0 both shipped with
  # missing mac dmgs on their first tag build because of it).
  release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            try {
              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: tag.replace(/^v/, ''),
                draft: false,
              });
            } catch (e) {
              if (e.status !== 422) throw e; // 422 = already exists — fine
            }

  build:
    needs: [release]
    # Manual (workflow_dispatch) runs skip the release job; still build.
    if: ${{ !cancelled() && (needs.release.result == 'success' || needs.release.result == 'skipped') }}
    strategy:
      # Don't let one platform's failure cancel the others — each publishes
      # its own installer independently.
      fail-fast: false
      matrix:
        # macos-15-intel is x64, macos-14 is Apple Silicon (arm64). We build
        # a native dmg on each so ffmpeg-static's single-arch binary matches
        # the target (a universal build can't merge that single-arch binary).
        # macos-13 was retired Dec 2025; macos-15-intel is the Intel label
        # GitHub provides through Aug 2027.
        os: [windows-latest, macos-15-intel, macos-14]
    runs-on: ${{ matrix.os }}
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build
      # Tag builds publish installers to a GitHub Release (feeds the in-app
      # update notification); manual runs only produce artifacts.
      - run: npx electron-builder --publish ${{ startsWith(github.ref, 'refs/tags/') && 'always' || 'never' }}
      - uses: actions/upload-artifact@v7
        with:
          name: storyreel-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip
