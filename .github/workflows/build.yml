name: Build installers

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # Draft-then-publish. electron-builder silently SKIPS asset uploads when the
  # release for the tag is already published (this is why v1.14.1/v1.15.0
  # first shipped without the mac dmgs: whichever job created the release
  # published it instantly, and the later platforms uploaded nothing while
  # reporting success). So: put the release into DRAFT before the matrix,
  # let every platform upload into the draft, then publish it once at the end.
  release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { owner, repo } = context.repo;
            const all = await github.paginate(github.rest.repos.listReleases, { owner, repo, per_page: 100 });
            const matches = all.filter((r) => r.tag_name === tag);
            if (!matches.length) {
              await github.rest.repos.createRelease({ owner, repo, tag_name: tag, name: tag.replace(/^v/, ''), draft: true });
              return;
            }
            // Keep the release holding the most assets; draft it so the
            // builders can upload; delete stray duplicates of the same tag.
            matches.sort((a, b) => b.assets.length - a.assets.length);
            await github.rest.repos.updateRelease({ owner, repo, release_id: matches[0].id, tag_name: tag, draft: true });
            for (const extra of matches.slice(1)) {
              await github.rest.repos.deleteRelease({ owner, repo, release_id: extra.id });
            }

  build:
    needs: [release]
    # Manual (workflow_dispatch) runs skip the release job; still build.
    if: ${{ !cancelled() && (needs.release.result == 'success' || needs.release.result == 'skipped') }}
    strategy:
      # Don't let one platform's failure cancel the others — each publishes
      # its own installer independently.
      fail-fast: false
      matrix:
        # macos-15-intel is x64, macos-14 is Apple Silicon (arm64). We build
        # a native dmg on each so ffmpeg-static's single-arch binary matches
        # the target (a universal build can't merge that single-arch binary).
        # macos-13 was retired Dec 2025; macos-15-intel is the Intel label
        # GitHub provides through Aug 2027.
        os: [windows-latest, macos-15-intel, macos-14]
    runs-on: ${{ matrix.os }}
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build
      # Tag builds publish installers to a GitHub Release (feeds the in-app
      # update notification); manual runs only produce artifacts.
      - run: npx electron-builder --publish ${{ startsWith(github.ref, 'refs/tags/') && 'always' || 'never' }}
      - uses: actions/upload-artifact@v7
        with:
          name: storyreel-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip

  # Publish the draft only after every platform has uploaded its assets —
  # the update feed goes live atomically with the complete installer set.
  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { owner, repo } = context.repo;
            const all = await github.paginate(github.rest.repos.listReleases, { owner, repo, per_page: 100 });
            const rel = all.find((r) => r.tag_name === tag);
            if (!rel) throw new Error(`No release found for ${tag}`);
            console.log('Assets:', rel.assets.map((a) => a.name).join(', '));
            await github.rest.repos.updateRelease({ owner, repo, release_id: rel.id, draft: false, make_latest: 'true' });
