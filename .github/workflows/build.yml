name: Build installers

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      # Don't let one platform's failure cancel the others — each publishes
      # its own installer independently.
      fail-fast: false
      matrix:
        # macos-15-intel is x64, macos-14 is Apple Silicon (arm64). We build
        # a native dmg on each so ffmpeg-static's single-arch binary matches
        # the target (a universal build can't merge that single-arch binary).
        # macos-13 was retired Dec 2025; macos-15-intel is the Intel label
        # GitHub provides through Aug 2027.
        os: [windows-latest, macos-15-intel, macos-14]
    runs-on: ${{ matrix.os }}
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build
      # Tag builds publish installers to a GitHub Release (feeds the in-app
      # update notification); manual runs only produce artifacts.
      - run: npx electron-builder --publish ${{ startsWith(github.ref, 'refs/tags/') && 'always' || 'never' }}
      - uses: actions/upload-artifact@v7
        with:
          name: storyreel-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip
